  - Events: events.md
  - Getting Started:
    - Overview: getting-started.md
    - Quick Start (EN): quick-start-en.md
    - Inicio Rápido (ES): quick-start-es.md
    - Reproducible Example: reproducible-example.md
  - Framework:
    - Overview: framework/overview.md
    - Architecture: framework/architecture.md
    - AI Native Concepts: framework/ai-native-concepts.md
    - AI Native Structure: framework/ai-native-structure.md
    - Instructions Architecture: framework/ai-native-instructions-architecture.md
  - Instructions:
    - Overview: instructions/index.md
    - Guidelines: instructions/al-guidelines.instructions.md
    - Code Style: instructions/al-code-style.instructions.md
    - Naming Conventions: instructions/al-naming-conventions.instructions.md
    - Performance: instructions/al-performance.instructions.md
    - Error Handling: instructions/al-error-handling.instructions.md
    - Events: instructions/al-events.instructions.md
    - Testing: instructions/al-testing.instructions.md
    - Copilot Integration: instructions/copilot-instructions.md
  - Agentic Workflows:
    - Overview: prompts/index.md
    - Environment & Setup:
      - Initialize Project: prompts/al-initialize.prompt.md
      - Context Creation: prompts/al-context.create.prompt.md
      - Memory Management: prompts/al-memory.create.prompt.md
    - Development:
      - Specifications: prompts/al-spec.create.prompt.md
      - Build & Deploy: prompts/al-build.prompt.md
    - Quality & Security:
      - PR Preparation: prompts/al-pr-prepare.prompt.md
  - Agents:
    - Overview: agents/index.md
    - Core Agents:
      - Architect: agents/al-architect.agent.md
      - Developer: agents/al-developer.agent.md
      - Pre-Sales Specialist: agents/al-presales.agent.md
    - Orchestra System:
      - Conductor: agents/al-conductor.agent.md
      - Planning Subagent: agents/al-planning-subagent.agent.md
      - Implement Subagent: agents/al-implement-subagent.agent.md
